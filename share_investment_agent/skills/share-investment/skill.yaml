id: share-investment-v1
name: share-investment
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Multi-agent system for comprehensive stock investment analysis of Chinese stocks.
  Coordinates 11 specialized agents to provide technical, fundamental, sentiment, valuation, and portfolio management recommendations.

# Tags and Modes
tags:
  - stock-analysis
  - investment-research
  - technical-analysis
  - fundamental-analysis
  - portfolio-management

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Analyze Ping An Bank (000001) for investment"
  - "Provide technical and fundamental analysis for stock 000001"
  - "Should I buy, hold, or sell Ping An Bank with full analysis including debate"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Comprehensive multi-agent investment analysis for Chinese stocks using 6-digit ticker codes"
    features:
      - "Market data acquisition from Chinese stock exchanges"
      - "Technical analysis with MACD, RSI, Bollinger Bands"
      - "Fundamental analysis with profitability and growth metrics"
      - "Sentiment analysis and market psychology assessment"
      - "DCF-based valuation analysis"
      - "Bullish vs bearish researcher debate simulation"
      - "Risk management assessment with VaR estimation"
      - "Macroeconomic analysis and policy impact"
      - "Portfolio management recommendations (buy/hold/sell)"
    limitations: "Requires 6-digit Chinese stock ticker, processing time 5-10 minutes, OpenRouter API key required"

  secondary_capability:
    supported: false
    planned_version: "2.0.0"
    description: "Real-time market data streaming and historical backtesting"

# Requirements
requirements:
  packages:
    - "langchain"
    - "langchain-openai"
    - "langchain-core"
    - "pandas"
    - "pydantic"
    - "bindu"
  system:
    - "Python 3.12+"
  min_memory_mb: 512

# Performance Metrics
performance:
  avg_processing_time_ms: 300000
  max_concurrent_requests: 3
  memory_per_request_mb: 512
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - Read
  - Write
  - Execute

# Rich Documentation
documentation:
  overview: |
    Multi-agent investment analysis system using LangChain and OpenRouter models.
    Coordinates 11 specialized agents: Market Data Acquisition, Technical Analysis, Fundamental Analysis,
    Sentiment Analysis, Valuation Analysis, Macro News, Bullish Researcher, Bearish Researcher,
    Debate Room, Risk Management, Macro Analyst, and Portfolio Management.
    Uses async execution with rate limiting and retry logic for LLM calls.

  use_cases:
    when_to_use:
      - "Investment decision support for Chinese stocks"
      - "Comprehensive due diligence before trading"
      - "Multi-perspective analysis combining technical and fundamental views"
      - "Risk assessment and portfolio allocation decisions"

    when_not_to_use:
      - "Real-time trading signals (processing takes 5-10 minutes)"
      - "Non-Chinese stocks or US equities"
      - "Stocks without 6-digit ticker codes"
      - "High-frequency trading strategies"

  input_structure: |
    JSON-RPC 2.0 message with stock ticker in text content.

    Example:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [
            {
              "kind": "text",
              "text": "Analyze Ping An Bank (000001) for investment"
            }
          ],
          "kind": "message",
          "messageId": "uuid",
          "contextId": "uuid",
          "taskId": "uuid"
        },
        "skillId": "share-investment-v1",
        "configuration": {
          "acceptedOutputModes": ["application/json"]
        }
      },
      "id": "uuid"
    }

    Constraints:
    - Must include 6-digit Chinese stock ticker code
    - Ticker extracted via regex patterns: (000001), 000001, ticker: 000001
    - Analysis request text can be natural language

  output_format: |
    JSON-RPC 2.0 result with markdown-formatted comprehensive analysis report.

    Success Response:
    {
      "jsonrpc": "2.0",
      "id": "uuid",
      "result": {
        "id": "task-uuid",
        "context_id": "context-uuid",
        "kind": "task",
        "status": {
          "state": "completed",
          "timestamp": "2026-03-13T10:46:46.973017+00:00"
        },
        "history": [
          {
            "role": "assistant",
            "parts": [
              {
                "kind": "text",
                "text": "### Share Investment Analysis Report:\n\n**Stock Ticker:** 000001\n**Final Investment Decision:** HOLD (Confidence: 0.7)\n**Technical Analysis:** sell (53%)\n**Fundamental Analysis:** sell (70%)\n**Sentiment:** bullish\n**Valuation:** fairly valued\n**Debate Result:** bullish_wins\n**Risk Level:** medium\n..."
              }
            ]
          }
        ],
        "artifacts": [
          {
            "name": "result",
            "parts": [{"kind": "text", "text": "Full markdown report"}]
          }
        ]
      }
    }

    Error Response:
    {
      "jsonrpc": "2.0",
      "result": {
        "history": [
          {
            "parts": [
              {
                "text": "Error: No stock ticker provided. Please include a 6-digit Chinese stock code (e.g., 000001)."
              }
            ]
          }
        ]
      }
    }

  error_handling:
    - "Missing ticker: Returns error message requesting 6-digit code"
    - "API failures: Retry with exponential backoff (3 attempts, 1-4 second delays)"
    - "Rate limits: Automatic retry after 30+ seconds based on retry_after header"
    - "Market data errors: Graceful degradation with partial analysis"
    - "LLM semaphore: Limits concurrent LLM calls to 3 to prevent rate limiting"

  examples:
    - title: "Comprehensive Investment Analysis"
      input:
        text: "Provide balanced investment analysis for Ping An Bank (000001) including technical, fundamental, sentiment, valuation, debate, and portfolio recommendation"
      output:
        status: "completed"
        action: "HOLD"
        confidence: 0.7
        technical_signal: "sell"
        fundamental_signal: "sell"
        sentiment: "bullish"
        valuation: "fairly valued"
        debate_outcome: "bullish_wins"
        risk_level: "medium"
        processing_time_ms: 447000

    - title: "Quick Stock Analysis"
      input:
        text: "Analyze stock 000001"
      output:
        status: "completed"
        action: "HOLD"
        specialists_involved: 11
        processing_time_ms: 300000

  best_practices:
    for_developers:
      - "Use async/await for all agent operations"
      - "Implement retry logic with exponential backoff for API calls"
      - "Use semaphore (limit=3) to prevent rate limit errors"
      - "Handle partial failures gracefully with error objects"

    for_orchestrators:
      - "Route Chinese stock analysis requests with 6-digit tickers to this skill"
      - "Expect 5-10 minute processing time per analysis"
      - "Do not use for real-time trading (async task pattern)"
      - "Chain with risk management or portfolio optimization skills"
      - "Monitor OpenRouter API quota and rate limits"

  installation: |
    Install via uv package manager.

    Required packages:
    uv sync

    Environment variables:
    OPENROUTER_API_KEY=<your-key>
    MODEL_NAME=openai/gpt-oss-120b (optional, default provided)

    Run:
    uv run python -m share_investment_agent

    Server runs on: http://127.0.0.1:3774

  versioning:
    - version: "1.0.0"
      date: "2026-03-13"
      changes: "Initial release with 11-agent multi-disciplinary analysis system"
    - version: "1.1.0"
      status: "planned"
      changes: "Real-time data streaming and historical backtesting"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "stock analysis"
    - "investment"
    - "technical analysis"
    - "fundamental analysis"
    - "buy sell hold"
    - "portfolio"
    - "Chinese stocks"
    - "valuation"

  specializations:
    - domain: "stock-investment-analysis"
      confidence_boost: 0.4
    - domain: "chinese-stocks"
      confidence_boost: 0.3
    - domain: "portfolio-management"
      confidence_boost: 0.2

  anti_patterns:
    - "Real-time trading signals"
    - "US stocks or non-Chinese markets"
    - "Cryptocurrency analysis"
    - "General financial advice"

  complexity_indicators:
    simple:
      - "Analyze stock [ticker]"
      - "Should I buy [ticker]"
    medium:
      - "Technical and fundamental analysis for [ticker]"
      - "Investment recommendation with risk assessment"
    complex:
      - "Comprehensive analysis with debate and all specialists"
      - "Multi-perspective analysis with bull/bear debate"
