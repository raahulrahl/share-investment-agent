            type: string
        max_latency_ms:
          type: integer
        max_cost_amount:
          type: number
          format: float
        required_tools:
          type: array
          items:
            type: string
        forbidden_tools:
          type: array
          items:
            type: string
        min_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        weights:
          type: object
    NegotiationResponse:
      type: object
      properties:
